<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NINAI Builds — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .brand {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7c6fff;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f0f0f8;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9090a8;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a35;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      color: #e8e8f0;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      margin-bottom: 16px;
    }

    input[type="password"]:focus { border-color: #7c6fff; }

    button {
      width: 100%;
      background: #7c6fff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    button:hover { background: #6b5ef0; }

    .error {
      font-size: 13px;
      color: #f87171;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">NINAI Builds</div>
    <h1>Team access</h1>
    <form method="POST">
      <label for="password">Password</label>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <input type="password" id="password" name="password" placeholder="Enter team password" autofocus required />
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
